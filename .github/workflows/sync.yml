name: APAC Calendar → Sheet Sync

on:
  schedule:
    # UTC+8 09:10, 11:10, 14:10, 16:10, 18:10
    # = UTC 01:10, 03:10, 06:10, 08:10, 10:10
    - cron: '10 1,3,6,8,10 * * *'
  workflow_dispatch:

concurrency:
  group: lark-excel-calendar
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lark-cli
        run: npm install -g @larksuite/cli

      - name: Configure lark-cli
        run: echo "${{ secrets.LARK_APP_SECRET }}" | lark-cli config init --app-id "${{ secrets.LARK_APP_ID }}" --app-secret-stdin --brand lark

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync calendar to sheet
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
        run: python3 sync_to_sheet.py
